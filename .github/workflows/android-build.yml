name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # Buildozer 兼容性最好

    - name: 安装 Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install buildozer

    - name: 安装系统依赖 (Buildozer 需要)
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk

    - name: 构建 Debug APK
      run: |
        buildozer -v android debug
      env:
        # 避免交互式提示
        LC_ALL: C.UTF-8
        LANG: C.UTF-8

    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: apk-file
        path: bin/*.apk
