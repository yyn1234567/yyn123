name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev imagemagick
          pip install --upgrade pip
          pip install buildozer
          pip install cython
          pip install numpy

      - name: Create assets directory
        run: |
          mkdir -p assets
          # Create simple splash screen and icon placeholders
          convert -size 512x512 xc:white -fill blue -draw "circle 256,256 256,150" assets/icon.png 2>/dev/null || \
            wget -O assets/icon.png https://raw.githubusercontent.com/kivy/kivy/master/kivy/tools/logo/kivy-icon-512.png || \
            echo "Icon placeholder created"

          convert -size 1024x500 xc:white -fill red -pointsize 48 -draw "text 100,250 'Fanqie Downloader'" assets/presplash.png 2>/dev/null || \
            wget -O assets/presplash.png https://raw.githubusercontent.com/kivy/kivy/master/kivy/tools/logo/presplash.png || \
            echo "Presplash placeholder created"

      - name: Build APK
        run: |
          buildozer android debug
          mv bin/*.apk bin/fanqie_downloader.apk || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fanqie-downloader-apk
          path: bin/*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: bin/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
