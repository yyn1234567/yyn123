name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build APK using Buildozer Docker image
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/app \
            kivy/buildozer \
            /bin/sh -c "cd /app && yes | buildozer android debug"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tomato-novel-apk
          path: '**/*.apk'
