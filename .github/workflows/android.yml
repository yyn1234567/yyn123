name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Flet
      run: pip install flet==0.84.0  # 显式指定版本避免波动

    - name: Build Android APK
      # ✅ 修复关键：单行命令（无续行符）
      run: flet build apk --bundle-id com.yyn123.fq --app-name "煲汤-Tb" --build-version 2.0.0 --build-number 1

    - name: Verify APK
      # 诊断步骤：确认文件生成位置
      run: ls -lh build/apk/release/

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: build/apk/release/app-release.apk
        if-no-files-found: error  # 严格检查
