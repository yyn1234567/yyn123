name: Build Android APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Flet
      run: pip install flet==0.84.0

    # ✅ 关键修复：环境变量严格绑定到步骤
    - name: Verify Environment  # 调试步骤（发布时可删除）
      run: |
        echo "FLUTTER_SKIP_CONFIRM=$FLUTTER_SKIP_CONFIRM"
        python -c "import os; print('Flet sees:', os.environ.get('FLUTTER_SKIP_CONFIRM'))"

    - name: Build Android APK
      env:  # ✅ 必须在这里！
        FLUTTER_SKIP_CONFIRM: "1"  # 值必须是字符串
      run: >
        flet build apk
        --bundle-id com.yyn123.fq
        --product "煲汤-Tb"
        --org com.yyn123
        --build-version 2.0.0
        --build-number 1

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/apk/release/app-release.apk
