name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build with Flet
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Flet
      run: pip install flet

    - name: Build Android APK
      # 修正关键点：使用 flet build apk + 正确参数
      run: |
        flet build apk \
          --bundle-id com.yyn123.fq \  # 必须修改为你的唯一包名
          --app-name "煲汤-Tb" \
          --build-version 2.0 \
          --build-number 1
      # 注意：输出路径已变更为 build/apk/release/app-release.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: android-apk
        path: build/apk/release/app-release.apk  # 修正输出路径
        if-no-files-found: error
