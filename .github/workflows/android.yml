name: Build Android APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Flet
      run: pip install flet==0.84.0

    # ✅ 关键修复：添加环境变量跳过确认
    - name: Build Android APK
      env:
        FLUTTER_SKIP_CONFIRM: 1  # 必须！
      run: >
        flet build apk
        --bundle-id com.yyn123.fq
        --product "煲汤-Tb"
        --org com.yyn123
        --build-version 2.0.0
        --build-number 1

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/apk/release/app-release.apk
