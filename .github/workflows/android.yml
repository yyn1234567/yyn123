name: Build Android APK

on:
  push:
    branches: [ main, master ] # 当推送到 main 或 master 分支时触发
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    name: Build with Flet
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Flet (to cache)
      run: pip install flet

    - name: Build Android APK
      uses: flet-dev/actions/build/android@latest
      with:
        # 可选：指定 requirements.txt 路径，如果不在根目录请修改
        # requirements: requirements.txt
        
        # --- 关键配置：请务必修改以下三项 ---
        app-id: com.yyn123.fq # 必须修改！格式通常是 com.你的名字.项目名
        app-name: 煲汤-Tb
        version: 2.0
        
        # --- 可选配置 ---
        # icon: assets/icon.png # 如果你有图标文件
        # splash: assets/splash.png # 如果你有启动图
        # permissions: | # 如果需要权限（本项目不需要读写外部存储，仅在沙盒内）
        #   android.permission.INTERNET

    - name: Upload APK
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: android-apk
        path: build/android/app/build/outputs/apk/release/app-release.apk
        if-no-files-found: ignore

    # 自动创建 Release 并上传 APK
    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: build/android/app/build/outputs/apk/release/app-release.apk
