name: Build Android APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Flet (v0.84.0)
      run: pip install flet==0.84.0  # 确认使用可用版本

    - name: Build Android APK (WORKING FIX)
      timeout-minutes: 25
      env:
        FLUTTER_SKIP_CONFIRM: "1"
        CI: "1"  # 触发 CI 模式
        FLUTTER_ANALYTICS_DISABLED: "1"  # 额外防护
      run: |
        # 终端欺骗补丁（解决 0.84.0 核心缺陷）
        echo "import sys; sys.stdin.isatty = lambda: False" > /tmp/tty_patch.py
        export PYTHONPATH=/tmp:$PYTHONPATH
        
        # 关键：添加 --no-interaction 参数
        flet build apk \
          --bundle-id com.yyn123.fq \
          --product "煲汤-Tb" \
          --org com.yyn123 \
          --build-version 2.0.0 \
          --build-number 1 \
          --no-interaction  # ← 必须存在！

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/apk/release/app-release.apk
