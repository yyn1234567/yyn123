name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # 确保aiohttp正确安装
        pip install aiohttp>=3.8.0

    - name: Verify installation
      run: |
        python -c "import flet; print('Flet version:', flet.__version__)"
        python -c "import aiohttp; print('aiohttp version:', aiohttp.__version__)"

    - name: Create Android manifest directory
      run: |
        mkdir -p android/app/src/main

    - name: Create AndroidManifest.xml
      run: |
        cat > android/app/src/main/AndroidManifest.xml << 'EOF'
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.yyn123.fq">
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
            <application
                android:label="煲汤-Tb"
                android:icon="@mipmap/ic_launcher">
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:launchMode="singleTop"
                    android:theme="@style/LaunchTheme"
                    android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                    android:hardwareAccelerated="true"
                    android:windowSoftInputMode="adjustResize">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

    - name: Build Android APK
      timeout-minutes: 30
      env:
        FLUTTER_SKIP_CONFIRM: "1"
        CI: "true"
      run: |
        # 创建终端欺骗补丁
        echo "import sys; sys.stdin.isatty = lambda: False" > $HOME/tty_patch.py
        export PYTHONSTARTUP=$HOME/tty_patch.py

        # 验证补丁生效
        echo "=== VERIFYING TERMINAL FIX ==="
        python -c "import sys; print('isatty:', sys.stdin.isatty())"

        # 确保main.py存在
        if [ ! -f "main.py" ]; then
          echo "Error: main.py not found!"
          exit 1
        fi

        # 使用yes自动确认安装
        yes | flet build apk \
          --bundle-id com.yyn123.fq \
          --product "煲汤-Tb" \
          --org com.yyn123 \
          --build-version 2.0.2 \
          --build-number 3

    - name: Check build output
      run: |
        echo "Build output directory contents:"
        ls -la build/apk/ || echo "No APK files found"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/apk/*.apk
        retention-days: 30

    - name: Upload Build Logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build/**/logs/
          **/*.log
        retention-days: 7
