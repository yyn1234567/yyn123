name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Display environment info
      run: |
        echo "=== 环境信息 ==="
        echo "Python version: $(python --version)"
        echo "OS: ${{ runner.os }}"
        echo "Workspace: ${{ github.workspace }}"

    - name: Install dependencies
      run: |
        echo "=== 安装依赖 ==="
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        echo "=== 验证安装 ==="
        python -c "import flet; print(f'Flet version: {flet.__version__}')"
        python -c "import aiohttp; print(f'aiohttp version: {aiohttp.__version__}')"
        python -c "import sys; print(f'Python executable: {sys.executable}')"

    - name: Create Android manifest directory
      run: |
        echo "=== 创建Android manifest目录 ==="
        mkdir -p android/app/src/main

    - name: Create AndroidManifest.xml
      run: |
        echo "=== 创建AndroidManifest.xml ==="
        cat > android/app/src/main/AndroidManifest.xml << 'EOF'
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.yyn123.fq">
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
            <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
            <application
                android:label="煲汤-Tb"
                android:icon="@mipmap/ic_launcher"
                android:requestLegacyExternalStorage="true">
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:launchMode="singleTop"
                    android:theme="@style/LaunchTheme"
                    android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                    android:hardwareAccelerated="true"
                    android:windowSoftInputMode="adjustResize">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        cat android/app/src/main/AndroidManifest.xml

    - name: Verify main.py exists
      run: |
        echo "=== 验证main.py ==="
        if [ ! -f "main.py" ]; then
          echo "Error: main.py not found!"
          exit 1
        fi
        echo "main.py found, size: $(wc -c < main.py) bytes"
        head -20 main.py

    - name: Display system resources
      run: |
        echo "=== 系统资源 ==="
        echo "Memory: $(free -h)"
        echo "Disk space: $(df -h ${{ github.workspace }})"
        echo "CPU cores: $(nproc)"

    - name: Build Android APK
      timeout-minutes: 30
      env:
        FLUTTER_SKIP_CONFIRM: "1"
        CI: "true"
      run: |
        echo "=== 开始构建APK ==="
        # 创建终端欺骗补丁
        echo "import sys; sys.stdin.isatty = lambda: False" > $HOME/tty_patch.py
        export PYTHONSTARTUP=$HOME/tty_patch.py

        # 验证补丁生效
        echo "=== 验证终端补丁 ==="
        python -c "import sys; print('isatty:', sys.stdin.isatty())"

        # 设置Flet构建环境变量
        export FLUTTER_ROOT=$HOME/flutter
        export PATH=$PATH:$FLUTTER_ROOT/bin

        echo "=== Flet构建信息 ==="
        echo "构建时间: $(date)"
        echo "Git commit: ${{ github.sha }}"
        echo "Git branch: ${{ github.ref_name }}"

        # 使用yes自动确认安装
        yes | flet build apk \
          --bundle-id com.yyn123.fq \
          --product "煲汤-Tb" \
          --org com.yyn123 \
          --build-version 2.0.3 \
          --build-number 4 \
          --project ${{ github.workspace }}

    - name: Check build output
      run: |
        echo "=== 检查构建输出 ==="
        if [ -d "build/apk" ]; then
          echo "构建目录内容:"
          ls -lah build/apk/
          if [ -f "build/apk/"*.apk ]; then
            echo "APK文件详情:"
            ls -lh build/apk/*.apk
            file build/apk/*.apk
          else
            echo "警告: 未找到APK文件"
          fi
        else
          echo "错误: build/apk目录不存在"
        fi

    - name: Display build summary
      if: always()
      run: |
        echo "=== 构建摘要 ==="
        echo "构建状态: ${{ job.status }}"
        echo "构建持续时间: ${{ job.duration }}"
        echo "工作目录: $(pwd)"
        echo "文件列表:"
        find build -type f 2>/dev/null || echo "无输出文件"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-${{ github.sha }}
        path: build/apk/*.apk
        retention-days: 30

    - name: Upload Build Logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ github.sha }}
        path: |
          build/**/logs/
          **/*.log
          .flutter-plugins
          .flutter-plugins-dependencies
        retention-days: 7

    - name: Create build summary
      if: always()
      run: |
        echo "## 构建结果" >> $GITHUB_STEP_SUMMARY
        echo "- **状态**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "- **时间**: $(date)" >> $GITHUB_STEP_SUMMARY
        echo "- **提交**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **分支**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
