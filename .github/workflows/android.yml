name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build with Flet
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Flet
      run: pip install flet

    - name: Build Android APK
      # 修改为直接运行 flet 命令，不再引用外部 Action
      run: |
        flet build android \
          --app-id com.yyn123.fq \ # ⚠️ 请务必修改此处ID
          --app-name "煲汤-Tb" \
          --version 2.0
      # 注意：Flet 会自动在 build/android 目录下生成文件

    - name: Upload APK
      uses: actions/upload-artifact@v4 # 更新到 v4
      if: always()
      with:
        name: android-apk
        path: build/android/app/build/outputs/apk/release/app-release.apk
        if-no-files-found: error # 改为 error 以便及时发现构建失败

    # 可选：如果你需要自动创建 Release，取消下面的注释
    # - name: Create Release
    #   uses: softprops/action-gh-release@v2
    #   if: startsWith(github.ref, 'refs/tags/')
    #   with:
    #     files: build/android/app/build/outputs/apk/release/app-release.apk
