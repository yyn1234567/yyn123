name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Flet (locked version)
      run: pip install flet==0.84.0  # 显式指定版本

    - name: Build Android APK
      run: |
        flet build apk \
          --bundle-id com.yyn123.fq \
          --product "煲汤-Tb" \       # 修复点：参数名修正
          --org com.yyn123 \          # 修复点：必须添加
          --build-version 2.0.0 \
          --build-number 1

    - name: Verify Build Output
      run: ls -lh build/apk/release/  # 确认文件生成

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: build/apk/release/app-release.apk
        if-no-files-found: error
