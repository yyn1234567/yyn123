name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # 确保aiohttp正确安装
        pip install aiohttp>=3.8.0

    - name: Verify installation
      run: |
        python -c "import flet; print('Flet version:', flet.__version__)"
        python -c "import aiohttp; print('aiohttp version:', aiohttp.__version__)"

    - name: Build Android APK
      timeout-minutes: 30
      env:
        FLUTTER_SKIP_CONFIRM: "1"
        CI: "true"
      run: |
        # 创建终端欺骗补丁
        echo "import sys; sys.stdin.isatty = lambda: False" > $HOME/tty_patch.py
        export PYTHONSTARTUP=$HOME/tty_patch.py

        # 验证补丁生效
        echo "=== VERIFYING TERMINAL FIX ==="
        python -c "import sys; print('isatty:', sys.stdin.isatty())"

        # 确保main.py存在
        if [ ! -f "main.py" ]; then
          echo "Error: main.py not found!"
          exit 1
        fi

        # 使用yes自动确认安装，并添加额外的构建选项
        yes | flet build apk \
          --bundle-id com.yyn123.fq \
          --product "煲汤-Tb" \
          --org com.yyn123 \
          --build-version 2.0.1 \
          --build-number 2

    - name: Check build output
      run: |
        echo "Build output directory contents:"
        ls -la build/apk/ || echo "No APK files found"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/apk/*.apk
        retention-days: 30

    - name: Upload Build Logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build/**/logs/
          **/*.log
        retention-days: 7
