name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build with Flet
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Flet
      run: pip install flet

    - name: Build Android APK
      # 修复了 Action 地址：使用 flet-dev/flet 而不是 flet-dev/actions
      uses: flet-dev/flet/build/android@stable 
      with:
        app-id: com.yyn123.fq # ⚠️ 请务必修改此处ID
        app-name: 煲汤-Tb
        version: 2.0

    - name: Upload APK
      # 修复了版本：使用 v4
      uses: actions/upload-artifact@v4 
      if: always()
      with:
        name: android-apk
        path: build/android/app/build/outputs/apk/release/app-release.apk
        if-no-files-found: ignore

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: build/android/app/build/outputs/apk/release/app-release.apk
