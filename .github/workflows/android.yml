name: Build Android APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Fixed Flet
      run: pip install flet==0.84.1  # 关键：使用修复版本

    - name: Disable Analytics
      run: |
        echo "FLUTTER_ANALYTICS_DISABLED=1" >> $GITHUB_ENV
        echo "PUB_HOSTED_URL=https://pub.flutter-io.cn" >> $GITHUB_ENV

    - name: Build Android APK (FINAL FIX)
      timeout-minutes: 25
      env:
        FLUTTER_SKIP_CONFIRM: "1"
        CI: "1"  # 双重保险
      run: |
        # 终端欺骗补丁（0.84.1 仍需此步骤）
        echo "import sys; sys.stdin.isatty = lambda: False" > /tmp/tty_patch.py
        export PYTHONPATH=/tmp:$PYTHONPATH
        
        flet build apk \
          --bundle-id com.yyn123.fq \
          --product "煲汤-Tb" \
          --org com.yyn123 \
          --build-version 2.0.0 \
          --build-number 1

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/apk/release/app-release.apk
