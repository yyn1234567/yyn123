name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Flet
      run: pip install flet==0.84.0

    # ✅ 关键修复：严格遵循3步规则
    - name: Build Android APK
      run: >
        flet build apk
        --bundle-id com.yyn123.fq
        --product "煲汤-Tb"
        --org com.yyn123
        --build-version 2.0.0
        --build-number 1

    - name: Verify APK
      run: ls -lh build/apk/release/app-release.apk
