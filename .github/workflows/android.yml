name: Build Android APK

on: 
  workflow_dispatch: # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 缓存 Docker 镜像层 (关键优化)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 2. 缓存 Python 依赖
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Flet
        run: pip install flet==0.84.0

      - name: Accept Android Licenses
        run: |
          yes | flutter doctor --android-licenses
          mkdir -p ~/.android
          echo "android.sdk.path=$ANDROID_HOME" > ~/.android/repositories.cfg

      - name: Build Android APK
        env:
          FLUTTER_SKIP_CONFIRM: "true"   # 跳过 Flutter 所有协议
          CI: "true"                    # 声明 CI 环境
          PYTHONUNBUFFERED: "1"         # 禁用 Python 缓冲（关键！）
        run: |
          flet build apk \
            --bundle-id com.yyn123.fq \
            --product "煲汤-Tb" \
            --org com.yyn123 \
            --build-version 2.0.0 \
            --build-number 1


      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/apk/*.apk
