name: Build Android APK (Auto-Confirm Root)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    container: kivy/buildozer:latest 
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 构建 Debug APK (自动确认Root权限)
        run: |
          # 关键修复：用 echo 'y' 自动跳过 "Are you sure [y/n]?" 提示
          echo 'y' | buildozer -v android debug
        env:
          # 必须设置：防止编码错误
          LC_ALL: C.UTF-8
          LANG: C.UTF-8
          # 强制Python实时输出日志（便于排查后续错误）
          PYTHONUNBUFFERED: 1

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
