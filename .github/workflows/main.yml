name: Build Android APK (Forced)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    container: kivy/buildozer:latest
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 预接受 Android SDK 许可协议
        run: |
          mkdir -p $HOME/.android/licenses
          # 写入 Google 官方许可哈希
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $HOME/.android/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $HOME/.android/licenses/android-sdk-license

      - name: 🔥 强制构建 APK (解决虚拟环境变量失效问题)
        run: |
          # 关键修复：使用 sh -c 包裹命令，并通过管道 echo 'y' 强制自动确认
          # 这能绕过 Python 虚拟环境对环境变量的隔离
          sh -c "echo 'y' | buildozer -v android debug"
        # 保留环境变量作为双重保险，但核心靠上面的 echo 'y' | 
        env:
          BUILDING_IN_CI: "1"
          LC_ALL: C.UTF-8
          LANG: C.UTF-8
          PYTHONUNBUFFERED: "1"

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
