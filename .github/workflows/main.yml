name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    container: kivy/buildozer:latest
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 自动接受 Android SDK 许可协议
        run: |
          # 关键步骤：自动确认所有 SDK 许可
          yes | sdkmanager --licenses
          # 额外验证：确保 Build-Tools 37 可安装
          sdkmanager "build-tools;37.0.0"

      - name: 构建 Debug APK
        run: |
          echo 'y' | buildozer -v android debug
        env:
          LC_ALL: C.UTF-8
          LANG: C.UTF-8
          PYTHONUNBUFFERED: 1

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
