name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    container: kivy/buildozer:latest 
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 构建 Debug APK
        run: |
          buildozer -v android debug
        env:
          # --- 核心修复：强制 Buildozer 以 CI 模式运行 ---
          # 这会跳过 "Buildozer is running as root!" 的交互式询问
          BUILDING_IN_CI: 1
          
          # 其他辅助环境变量
          LC_ALL: C.UTF-8
          LANG: C.UTF-8
          PYTHONUNBUFFERED: 1

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
